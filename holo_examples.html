<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hologram Stili Örnekleri</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'JetBrains Mono',monospace;color:#00d4ff;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:100vh}
.card{border:1px solid rgba(0,212,255,.2);border-radius:8px;overflow:hidden;background:#020810}
.card-label{padding:10px 14px;font-size:11px;letter-spacing:2px;border-bottom:1px solid rgba(0,212,255,.12);color:rgba(0,212,255,.7)}
.card-label span{color:#64ffda;font-weight:700}
.frame{display:flex;align-items:center;justify-content:center;padding:20px;height:280px;position:relative;overflow:hidden}

/* ── A: NEON GLOW ── */
.neon-bg{background:#000}
.neon-svg .zone{fill:rgba(0,212,255,.04);stroke:#00d4ff;stroke-width:1.5;filter:drop-shadow(0 0 4px #00d4ff)}
.neon-svg .shop{fill:rgba(0,212,255,.08);stroke:#64ffda;stroke-width:1;filter:drop-shadow(0 0 6px #64ffda)}
.neon-svg .corr{fill:rgba(0,212,255,.02);stroke:rgba(0,212,255,.5);stroke-width:.5}
.neon-svg text{fill:#64ffda;font-family:'JetBrains Mono',monospace;font-size:9px;text-anchor:middle;dominant-baseline:middle;filter:drop-shadow(0 0 3px #64ffda)}
.neon-svg .dim{fill:rgba(0,212,255,.35);filter:none}

/* ── B: PERSPEKTİF 3D ── */
.persp-wrap{perspective:600px;perspective-origin:50% 30%}
.persp-inner{transform:rotateX(38deg) scale(.95);transform-origin:50% 80%}
.persp-svg .zone{fill:rgba(0,212,255,.05);stroke:rgba(0,212,255,.6);stroke-width:1.2}
.persp-svg .shop{fill:rgba(0,180,255,.1);stroke:#00d4ff;stroke-width:.8}
.persp-svg .wall{fill:rgba(0,212,255,.18);stroke:rgba(0,212,255,.9);stroke-width:.5}
.persp-svg text{fill:rgba(0,212,255,.8);font-family:'JetBrains Mono',monospace;font-size:8px;text-anchor:middle}
.persp-svg .grid{stroke:rgba(0,212,255,.06);stroke-width:.5}

/* ── C: SCANLINE HOLOGRam ── */
.scan-wrap{position:relative}
.scan-svg .zone{fill:rgba(0,212,255,.03);stroke:rgba(0,212,255,.45);stroke-width:1}
.scan-svg .shop{fill:rgba(100,255,218,.06);stroke:#64ffda;stroke-width:1.2}
.scan-svg text{fill:#64ffda;font-family:'JetBrains Mono',monospace;font-size:8.5px;text-anchor:middle;dominant-baseline:middle}
.scan-lines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.04) 2px,rgba(0,212,255,.04) 3px);pointer-events:none;animation:flicker 4s infinite}
.scan-bar{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.8) 30%,rgba(100,255,218,.9) 50%,rgba(0,212,255,.8) 70%,transparent);animation:scanbar 2.8s linear infinite;filter:blur(.5px)}
@keyframes scanbar{0%{top:5%;opacity:0}8%{opacity:1}90%{opacity:.4}100%{top:95%;opacity:0}}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.88}94%{opacity:1}97%{opacity:.92}98%{opacity:1}}

/* ── D: İZOMETRİK ── */
.iso-wrap{perspective:none}
.iso-svg{transform:rotate(-30deg) skewX(30deg) scaleY(.6) scaleX(.9)}
.iso-svg .zone{fill:rgba(0,212,255,.06);stroke:rgba(0,212,255,.5);stroke-width:1.5}
.iso-svg .shop-f{fill:rgba(0,212,255,.15);stroke:#00d4ff;stroke-width:1}
.iso-svg .shop-s{fill:rgba(0,100,150,.5);stroke:rgba(0,212,255,.4);stroke-width:.8}
.iso-svg .shop-t{fill:rgba(0,60,100,.7);stroke:rgba(0,212,255,.3);stroke-width:.6}
.iso-svg text{display:none}
</style>
</head>
<body>

<!-- A: NEON GLOW -->
<div class="card">
  <div class="card-label"><span>A</span> — NEON GLOW &nbsp;·&nbsp; Parlayan çizgiler, drop-shadow filter</div>
  <div class="frame neon-bg">
    <svg class="neon-svg" viewBox="0 0 400 220" width="360" height="210">
      <!-- outer -->
      <rect x="10" y="10" width="380" height="200" rx="6" class="zone"/>
      <!-- corridors -->
      <rect x="10" y="10" width="380" height="200" rx="6" fill="none" stroke="rgba(0,212,255,.08)" stroke-width="12"/>
      <!-- vertical corridor -->
      <rect x="128" y="10" width="18" height="200" class="corr"/>
      <rect x="254" y="10" width="18" height="200" class="corr"/>
      <!-- horizontal corridor -->
      <rect x="10" y="138" width="380" height="18" class="corr"/>
      <!-- shops left -->
      <rect x="18" y="18" width="102" height="112" rx="3" class="shop"/>
      <text x="69" y="50">☕</text><text x="69" y="66" class="dim">% Arabica</text>
      <!-- shops center -->
      <rect x="154" y="18" width="92" height="112" rx="3" class="shop"/>
      <text x="200" y="50">🍎</text><text x="200" y="66" class="dim">Apple Store</text>
      <rect x="254" y="18" width="92" height="112" rx="3" class="shop" style="stroke:#fbbf24;filter:drop-shadow(0 0 6px #fbbf24)"/>
      <text x="298" y="50" style="fill:#fbbf24;filter:drop-shadow(0 0 3px #fbbf24)">👜</text>
      <text x="298" y="66" style="fill:#fbbf24;filter:none" class="dim">Gucci</text>
      <!-- shops right -->
      <rect x="280" y="18" width="102" height="112" rx="3" class="shop" style="stroke:#a855f7;filter:drop-shadow(0 0 6px #a855f7)"/>
      <text x="331" y="50" style="fill:#a855f7">👜</text>
      <text x="331" y="66" style="fill:#a855f7;filter:none" class="dim">Louis V.</text>
      <!-- bottom shops -->
      <rect x="18" y="164" width="48" height="38" rx="2" class="shop"/>
      <rect x="72" y="164" width="48" height="38" rx="2" class="shop"/>
      <rect x="154" y="164" width="92" height="38" rx="2" class="shop" style="stroke:rgba(249,115,22,.8);filter:drop-shadow(0 0 5px rgba(249,115,22,.6))"/>
      <text x="200" y="183" style="fill:rgba(249,115,22,.9);filter:none" class="dim">FOOD HALL</text>
      <rect x="280" y="164" width="102" height="38" rx="2" class="shop"/>
      <!-- YOU dot -->
      <circle cx="200" cy="148" r="6" fill="#64ffda" style="filter:drop-shadow(0 0 8px #64ffda)"/>
      <text x="200" y="133" style="font-size:7px;fill:#64ffda;filter:drop-shadow(0 0 4px #64ffda)">YOU</text>
    </svg>
  </div>
</div>

<!-- B: PERSPEKTİF -->
<div class="card">
  <div class="card-label"><span>B</span> — PERSPEKTİF 3D &nbsp;·&nbsp; CSS rotateX, kuş bakışı açısı</div>
  <div class="frame" style="background:#000;align-items:flex-end;padding-bottom:10px">
    <div class="persp-wrap" style="width:100%">
      <div class="persp-inner">
        <svg class="persp-svg" viewBox="0 0 400 220" width="100%" height="200">
          <!-- grid -->
          <defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M20 0L0 0 0 20" fill="none" class="grid"/>
          </pattern></defs>
          <rect x="10" y="10" width="380" height="200" fill="url(#g)"/>
          <!-- outer border -->
          <rect x="10" y="10" width="380" height="200" rx="4" class="zone"/>
          <!-- corridors -->
          <rect x="128" y="10" width="18" height="200" class="wall"/>
          <rect x="10" y="138" width="380" height="18" class="wall"/>
          <!-- zones with solid fills -->
          <rect x="18" y="18" width="102" height="112" rx="3" class="shop" style="fill:rgba(0,212,255,.12)"/>
          <text x="69" y="74">% Arabica</text>
          <rect x="154" y="18" width="156" height="112" rx="3" class="shop" style="fill:rgba(0,212,255,.1)"/>
          <text x="232" y="74">Apple Store</text>
          <rect x="318" y="18" width="64" height="112" rx="3" class="shop" style="fill:rgba(168,85,247,.12);stroke:#a855f7"/>
          <text x="350" y="74" style="fill:#a855f7">Gucci</text>
          <!-- bottom -->
          <rect x="18" y="164" width="44" height="38" rx="2" class="shop"/>
          <rect x="68" y="164" width="44" height="38" rx="2" class="shop"/>
          <rect x="154" y="164" width="96" height="38" rx="2" class="shop" style="fill:rgba(249,115,22,.1);stroke:rgba(249,115,22,.5)"/>
          <text x="202" y="183" style="fill:rgba(249,115,22,.7)">FOOD HALL</text>
          <!-- YOU -->
          <circle cx="200" cy="148" r="8" fill="none" stroke="#64ffda" stroke-width="1.5"/>
          <circle cx="200" cy="148" r="4" fill="#64ffda"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- C: SCANLINE HOLOGRam -->
<div class="card">
  <div class="card-label"><span>C</span> — SCANLINE HOLOGRAM &nbsp;·&nbsp; Tarama çizgisi + titreme</div>
  <div class="frame scan-wrap" style="background:#000205">
    <svg class="scan-svg" viewBox="0 0 400 220" width="360" height="210">
      <!-- bg dots -->
      <g opacity=".15">
        <script type="text/javascript">/* dots drawn via CSS bg instead */</script>
      </g>
      <!-- outer glow frame -->
      <rect x="10" y="10" width="380" height="200" rx="6" fill="none" stroke="rgba(0,212,255,.6)" stroke-width="1.5"/>
      <rect x="10" y="10" width="380" height="200" rx="6" fill="none" stroke="rgba(0,212,255,.15)" stroke-width="8"/>
      <!-- vertical corr -->
      <rect x="128" y="10" width="18" height="200" fill="rgba(0,212,255,.015)" stroke="rgba(0,212,255,.35)" stroke-width=".6"/>
      <rect x="254" y="10" width="18" height="200" fill="rgba(0,212,255,.015)" stroke="rgba(0,212,255,.35)" stroke-width=".6"/>
      <!-- h corr -->
      <rect x="10" y="138" width="380" height="18" fill="rgba(0,212,255,.015)" stroke="rgba(0,212,255,.35)" stroke-width=".6"/>
      <!-- shops -->
      <rect x="18" y="18" width="102" height="112" rx="3" class="shop"/>
      <text x="69" y="68">% Arabica</text>
      <rect x="154" y="18" width="92" height="112" rx="3" class="shop"/>
      <text x="200" y="68">Apple Store</text>
      <rect x="272" y="18" width="110" height="112" rx="3" class="shop" style="stroke:#a855f7;fill:rgba(168,85,247,.06)"/>
      <text x="327" y="68" style="fill:#a855f7">Luxury</text>
      <!-- bottom shops -->
      <rect x="18" y="164" width="48" height="38" rx="2" class="shop"/>
      <rect x="72" y="164" width="48" height="38" rx="2" class="shop"/>
      <rect x="154" y="164" width="92" height="38" rx="2" class="shop" style="stroke:rgba(249,115,22,.7);fill:rgba(249,115,22,.05)"/>
      <text x="200" y="183" style="fill:rgba(249,115,22,.8)">FOOD HALL</text>
      <rect x="272" y="164" width="110" height="38" rx="2" class="shop"/>
      <!-- YOU -->
      <circle cx="200" cy="148" r="14" fill="none" stroke="rgba(100,255,218,.25)" stroke-width="8"/>
      <circle cx="200" cy="148" r="6" fill="#64ffda"/>
      <text x="200" y="133" style="font-size:7px;fill:#64ffda">YOU</text>
      <!-- corner marks -->
      <path d="M18,28 L18,18 L28,18" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M382,28 L382,18 L372,18" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M18,202 L18,202 L18,202 L18,202" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M18,202 L18,202 L28,202 M18,192 L18,202" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M382,202 L372,202 M382,192 L382,202" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    </svg>
    <div class="scan-lines"></div>
    <div class="scan-bar"></div>
  </div>
</div>

<!-- D: BLUEPRINT -->
<div class="card">
  <div class="card-label"><span>D</span> — BLUEPRINT &nbsp;·&nbsp; Teknik çizim tarzı, beyaz/mavi çizgiler</div>
  <div class="frame" style="background:#040c1a">
    <svg viewBox="0 0 400 220" width="360" height="210" style="opacity:.95">
      <defs>
        <pattern id="bp" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(100,180,255,.08)" stroke-width=".5"/>
        </pattern>
        <pattern id="bp2" width="100" height="100" patternUnits="userSpaceOnUse">
          <path d="M100 0L0 0 0 100" fill="none" stroke="rgba(100,180,255,.15)" stroke-width=".8"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="400" height="220" fill="url(#bp)"/>
      <rect x="0" y="0" width="400" height="220" fill="url(#bp2)"/>
      <!-- outer -->
      <rect x="10" y="10" width="380" height="200" rx="4" fill="rgba(0,40,100,.25)" stroke="rgba(100,200,255,.7)" stroke-width="1.5"/>
      <!-- dim lines -->
      <line x1="10" y1="5" x2="390" y2="5" stroke="rgba(100,200,255,.3)" stroke-width=".5" stroke-dasharray="3,3"/>
      <line x1="10" y1="215" x2="390" y2="215" stroke="rgba(100,200,255,.3)" stroke-width=".5" stroke-dasharray="3,3"/>
      <line x1="5" y1="10" x2="5" y2="210" stroke="rgba(100,200,255,.3)" stroke-width=".5" stroke-dasharray="3,3"/>
      <line x1="395" y1="10" x2="395" y2="210" stroke="rgba(100,200,255,.3)" stroke-width=".5" stroke-dasharray="3,3"/>
      <!-- corridors (light) -->
      <rect x="128" y="10" width="18" height="200" fill="rgba(100,180,255,.12)" stroke="rgba(100,200,255,.4)" stroke-width=".8"/>
      <rect x="10" y="138" width="380" height="18" fill="rgba(100,180,255,.12)" stroke="rgba(100,200,255,.4)" stroke-width=".8"/>
      <!-- shops - solid white/blue -->
      <rect x="18" y="18" width="102" height="112" fill="rgba(255,255,255,.04)" stroke="rgba(150,210,255,.6)" stroke-width="1"/>
      <text x="69" y="68" fill="rgba(200,230,255,.85)" font-family="'JetBrains Mono',monospace" font-size="8.5" text-anchor="middle">% ARABICA</text>
      <text x="69" y="55" fill="rgba(200,230,255,.4)" font-family="'JetBrains Mono',monospace" font-size="18" text-anchor="middle">☕</text>
      <rect x="154" y="18" width="92" height="112" fill="rgba(255,255,255,.04)" stroke="rgba(150,210,255,.6)" stroke-width="1"/>
      <text x="200" y="68" fill="rgba(200,230,255,.85)" font-family="'JetBrains Mono',monospace" font-size="8.5" text-anchor="middle">APPLE STORE</text>
      <text x="200" y="55" fill="rgba(200,230,255,.4)" font-family="'JetBrains Mono',monospace" font-size="18" text-anchor="middle">🍎</text>
      <rect x="254" y="18" width="128" height="112" fill="rgba(255,255,255,.04)" stroke="rgba(150,210,255,.6)" stroke-width="1"/>
      <text x="318" y="68" fill="rgba(200,230,255,.85)" font-family="'JetBrains Mono',monospace" font-size="8.5" text-anchor="middle">LUXURY ZONE</text>
      <!-- bottom -->
      <rect x="18" y="164" width="48" height="38" fill="rgba(255,255,255,.03)" stroke="rgba(150,210,255,.4)" stroke-width=".8"/>
      <rect x="72" y="164" width="48" height="38" fill="rgba(255,255,255,.03)" stroke="rgba(150,210,255,.4)" stroke-width=".8"/>
      <rect x="154" y="164" width="92" height="38" fill="rgba(255,120,50,.05)" stroke="rgba(255,150,80,.4)" stroke-width=".8"/>
      <text x="200" y="183" fill="rgba(255,150,80,.7)" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">FOOD HALL</text>
      <rect x="254" y="164" width="128" height="38" fill="rgba(255,255,255,.03)" stroke="rgba(150,210,255,.4)" stroke-width=".8"/>
      <!-- dimension marks -->
      <text x="69" y="8" fill="rgba(100,180,255,.5)" font-family="'JetBrains Mono',monospace" font-size="6" text-anchor="middle">← 102m →</text>
      <text x="200" y="8" fill="rgba(100,180,255,.5)" font-family="'JetBrains Mono',monospace" font-size="6" text-anchor="middle">← 92m →</text>
      <!-- YOU -->
      <circle cx="200" cy="148" r="10" fill="none" stroke="rgba(100,255,200,.6)" stroke-width="1.2" stroke-dasharray="3,2"/>
      <circle cx="200" cy="148" r="4" fill="rgba(100,255,200,.8)"/>
      <text x="200" y="134" fill="rgba(100,255,200,.7)" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">YOU</text>
      <!-- title stamp -->
      <rect x="300" y="188" width="82" height="16" fill="none" stroke="rgba(100,200,255,.3)" stroke-width=".5"/>
      <text x="341" y="199" fill="rgba(100,200,255,.5)" font-family="'JetBrains Mono',monospace" font-size="6.5" text-anchor="middle">DUBAI SQUARE · L1</text>
    </svg>
  </div>
</div>

</body>
</html>
